name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  health-check:
    name: Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_URL }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"

      - name: Verify response
        run: |
          RESPONSE=$(curl -s "${{ vars.PRODUCTION_URL }}/api/health")
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          status = data.get('status', 'unknown')
          print(f'Status: {status}')
          if status == 'unhealthy':
              print('WARNING: Application is unhealthy after deploy!')
              sys.exit(1)
          "

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy, health-check]
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "::error::Deployment or health check failed!"
          echo "Check the deployment logs and /api/health endpoint."
