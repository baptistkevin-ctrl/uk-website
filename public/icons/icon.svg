<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <!-- Shine effect -->
  <rect width="256" height="512" rx="100" fill="url(#shine)"/>
  <!-- Shopping bag icon -->
  <g transform="translate(106, 80)" fill="white">
    <!-- Bag body -->
    <path d="M50 120 L25 400 C23 420 38 440 60 440 L240 440 C262 440 277 420 275 400 L250 120 Z" fill="white" opacity="0.95"/>
    <!-- Bag handles -->
    <path d="M100 120 C100 60 130 20 150 20 C170 20 200 60 200 120" fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
    <!-- M letter for MegaMart -->
    <text x="150" y="320" font-family="Arial Black, sans-serif" font-size="140" font-weight="900" fill="#ff6b00" text-anchor="middle">M</text>
  </g>
  <!-- Star burst accent -->
  <circle cx="400" cy="120" r="40" fill="white" opacity="0.2"/>
  <path d="M400 90 L405 110 L425 110 L410 122 L415 142 L400 130 L385 142 L390 122 L375 110 L395 110 Z" fill="white" opacity="0.9"/>
</svg>
